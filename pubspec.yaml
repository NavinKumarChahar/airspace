name: air_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/AIR_Icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true # android min sdk min:16, default 21


flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
