name: air_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  intl: ^0.20.2
  flutter_native_splash: ^2.2.10+1
  scrollable_positioned_list: ^0.3.8  
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  provider: ^6.1.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/AIR_Icon.png"
  web:
    generate: true
    image_path: "assets/images/AIR_Icon_Web.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  min_sdk_android: 21
  remove_alpha_ios: true # android min sdk min:16, default 21

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/air_splash_logo.png
  # branding: assets/images/webPinoBrand.png
  color_dark: "#121212"
  image_dark: assets/images/air_splash_logo.png
  # branding_dark: assets/images/webPinoBrand.png
  # fill: true

  android_12:
    image: assets/images/air_splash_logo.png
    icon_background_color: "#ffffff"
    image_dark: assets/images/air_splash_logo.png
    icon_background_color_dark: "#121212"
    # fill: true

  web: true
  image_web: assets/images/air_splash_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
