name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env.json configuration file
        run: |
          echo '{
            "AppIdAgorra": "${{ secrets.AppIdAgorra }}"
          }' > .env.json

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web Release
        run: flutter build web --release --base-href="/asathes.github.io/" --dart-define-from-file=.env.json

       Tar- name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
